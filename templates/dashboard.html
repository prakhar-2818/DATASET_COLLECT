<!DOCTYPE html>
<html>

<head>
<title>Housing Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">

<nav id="mainNav">
<div class="logo">
<span class="logo-icon">🏠</span> Housing Market Trends
</div>
<ul>
<li><a href="/">Home</a></li>
<li><a href="/about">About</a></li>
<li><a href="/dashboard">Dashboard</a></li>
<li><a href="/story">Story</a></li>
</ul>
</nav>

<!-- DASHBOARD HERO -->
<section class="page-hero">
<h1 class="page-hero-title">House Price Analysis <span class="hero-accent">Dashboard</span></h1>
<p class="page-hero-sub">Explore comprehensive housing market data through interactive Tableau visualizations.</p>
</section>

<!-- DASHBOARD EMBED -->
<section class="embed-section">
<div class="glass-embed-container">

<div class='tableauPlaceholder' id='vizDashboard' style='position: relative'>

<noscript>
<a href='#'>
<img alt='Dashboard'
src='https://public.tableau.com/static/images/Bo/Book1_17728619571510/Dashboard1/1.png'
style='border:none'/>
</a>
</noscript>

<object class='tableauViz' style='display:none;'>

<param name='host_url' value='https://public.tableau.com/' />
<param name='embed_code_version' value='3' />
<param name='name' value='Book1_17728619571510/Dashboard1' />
<param name='tabs' value='no' />
<param name='toolbar' value='yes' />

</object>

</div>

</div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
<p>&copy; 2026 <span class="footer-accent">Housing Market Trends</span> | Built with Flask + Tableau</p>
</footer>

<script type='text/javascript'>

var divElement = document.getElementById('vizDashboard');
var vizElement = divElement.getElementsByTagName('object')[0];

vizElement.style.width='100%';
vizElement.style.height='850px';

var scriptElement = document.createElement('script');
scriptElement.src="https://public.tableau.com/javascripts/api/viz_v1.js";
vizElement.parentNode.insertBefore(scriptElement, vizElement);

</script>

<!-- SCROLL NAV -->
<script>
window.addEventListener('scroll', function(){
var nav = document.getElementById('mainNav');
if(window.scrollY > 60){
nav.classList.add('nav-scrolled');
} else {
nav.classList.remove('nav-scrolled');
}
});
</script>

</body>
</html>
